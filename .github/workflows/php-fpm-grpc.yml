name: php-fpm-grpc ci

on:
  push:
    tags:
      - 'php/*'
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'PHP version (e.g., 8.4.19)'
        required: true
        type: string
      LATEST:
        description: 'Push latest tag to DockerHub'
        required: false
        default: false
        type: boolean

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      -
        name: Get version and latest flag
        id: get_version
        run: |
          # Parse version and detect latest from tag name
          # Tag format: php/x.y.z-fpm or php/x.y.z-latest-fpm
          TAG_NAME=${{ github.ref_name }}
          # Extract version (remove php/ prefix and -fpm suffix)
          VERSION=$(echo "$TAG_NAME" | cut -d / -f 2 | sed 's/-fpm//')
          # Check if -latest suffix exists
          if echo "$VERSION" | grep -q "\-latest"; then
            VERSION_WITHOUT_LATEST=$(echo "$VERSION" | sed 's/-latest//')
            echo "VERSION=$VERSION_WITHOUT_LATEST" >> $GITHUB_OUTPUT
            echo "LATEST=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "LATEST=false" >> $GITHUB_OUTPUT
          fi
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build php-grpc version
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          LATEST=${{ steps.get_version.outputs.LATEST }}
          echo "Building for VERSION=${VERSION}, LATEST=${LATEST}"
          if [ "$LATEST" = "true" ]; then
            docker buildx build \
              --build-arg="PHP_FPM_VERSION=${VERSION}" \
              --platform linux/amd64,linux/arm64 \
              --tag ${{ github.repository_owner }}/php-grpc:${VERSION}-grpc \
              --tag ${{ github.repository_owner }}/php-grpc:latest \
              --file php/Dockerfile-php-grpc --push .
          else
            docker buildx build \
              --build-arg="PHP_FPM_VERSION=${VERSION}" \
              --platform linux/amd64,linux/arm64 \
              --tag ${{ github.repository_owner }}/php-grpc:${VERSION}-grpc \
              --file php/Dockerfile-php-grpc --push .
          fi
